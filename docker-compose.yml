services:
  # The Nginx Server
  nginx:
    image: nginx:alpine
    stop_signal: SIGTERM
    working_dir: /var/www
    container_name: nginx
    # 定期 reload 讓 certbot renew 後的新憑證生效
    command: /bin/sh -c "while :; do sleep 6h; nginx -s reload; done & exec nginx -g 'daemon off;'"
    volumes:
      # 基本 conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - letsencrypt:/etc/letsencrypt
    ports:
      - 80:80
      - 443:443
    depends_on:
      api-server-axum:
        condition: service_started

  certbot:
    image: certbot/dns-cloudflare
    container_name: certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./nginx/cloudflare.ini:/etc/cloudflare/cloudflare.ini:ro
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

  # The Database
  database:
    image: postgres:17-alpine
    container_name: database
    volumes:
      - ../dbdata:/var/lib/postgresql/data
    environment:
      - "PGDATA=/var/lib/postgresql/data/pgdata"
      - "POSTGRES_DB=kawa"
      - "POSTGRES_USER=kawa"
      - "POSTGRES_PASSWORD=kawa"
      - "PGUSER=kawa"
    # ports:
    #     - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "kawa", "-U", "kawa"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  valkey:
    image: 'valkey/valkey:alpine'
    ulimits:
      memlock: -1
    # ports:
    #   - "6379:6379"
    container_name: valkey


volumes:
  dbdata:
  letsencrypt:
