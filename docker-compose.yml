services:
  # The Nginx Server
  nginx:
    image: nginx:alpine
    working_dir: /var/www
    container_name: nginx
    volumes:
      # 基本 conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80
      - 443:443
    depends_on:
      api-server-axum:
        condition: service_started

  # The Database
  database:
    image: postgres:17-alpine
    container_name: database
    volumes:
      - ../dbdata:/var/lib/postgresql/data
    environment:
      - "PGDATA=/var/lib/postgresql/data/pgdata"
      - "POSTGRES_DB=kawa"
      - "POSTGRES_USER=kawa"
      - "POSTGRES_PASSWORD=kawa"
      - "PGUSER=kawa"
    # ports:
    #     - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "kawa", "-U", "kawa"]
      interval: 1s
      timeout: 10s
      retries: 5
      start_period: 80s

  valkey:
    image: 'valkey/valkey:alpine'
    ulimits:
      memlock: -1
    # ports:
    #   - "6379:6379"
    container_name: valkey


volumes:
  dbdata:
